plugins:
  '@thymian/http-linter':
    options:
      ruleSets:
        - '@thymian/rfc-9110-rules'
  '@thymian/openapi':
    options:
      descriptions:
        - source: test.openapi.yaml
  '@thymian/request-dispatcher': {}
  '@thymian/sampler': {}
  '@thymian/reporter':
    options:
      formatters:
        cli: {}
  '@thymian/format-validator': {}
