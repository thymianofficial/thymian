name: E2E
on:
  push:
    branches:
      - main
      - rework-arch
  pull_request: {}
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install
        run: npm ci
      - name: Build packages
        run: npx nx build thymian
      - name: Run Thymian E2E tests
        run: npx nx e2e e2e-tests
