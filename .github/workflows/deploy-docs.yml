name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Nx SHAs for affected detection
        uses: nrwl/nx-set-shas@v4

      - name: Check if astro-docs is affected
        id: check-affected
        run: |
          if npx nx show project astro --affected > /dev/null 2>&1; then
            echo "affected=true" >> $GITHUB_OUTPUT
            echo "✅ astro-docs is affected - will build and deploy"
          else
            echo "affected=false" >> $GITHUB_OUTPUT
            echo "⏭️ astro-docs is not affected - skipping deployment"
          fi

      - name: Build astro-docs
        if: steps.check-affected.outputs.affected == 'true'
        run: npx nx build astro

      - name: Setup Pages
        if: steps.check-affected.outputs.affected == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.check-affected.outputs.affected == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro-docs/dist

      - name: Deploy to GitHub Pages
        if: steps.check-affected.outputs.affected == 'true'
        uses: actions/deploy-pages@v4
