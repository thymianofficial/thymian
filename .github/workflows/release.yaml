name: Release
# NOTE: Do not rename this file. A single workflow file is required for npm trusted publishing.
# Future release types (standard, beta, etc.) will be added to this workflow.
on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  canary-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    if: "github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-canary]')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish canary release
        run: node ./scripts/release.ts --dist-tag canary --no-dry-run --no-local
        env:
          NPM_CONFIG_PROVENANCE: true

  publish-latest-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    if: (github.event_name == 'release' && github.event.action == 'published') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Determine tag
        id: determine-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Check out repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.determine-tag.outputs.tag }}
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from release tag
        id: extract-version
        run: |
          TAG_NAME="${{ steps.determine-tag.outputs.tag }}"
          # Remove 'v' prefix if present
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Publish to npm
        run: node ./scripts/release.ts --dist-tag latest --version ${{ steps.extract-version.outputs.version }} --no-dry-run --no-local
        env:
          NPM_CONFIG_PROVENANCE: true
