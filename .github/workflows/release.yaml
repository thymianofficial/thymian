name: Release
# NOTE: Do not rename this file. A single workflow file is required for npm trusted publishing.
# Future release types (standard, beta, etc.) will be added to this workflow.
on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - publish-latest-release
          - canary-release
        default: publish-latest-release
      tag:
        description: 'Tag to publish (required for publish-latest-release)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  canary-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-canary]')) ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'canary-release')
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Compute canary version
        id: canary-version
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d%H%M%S)
          # Derive next semver base from latest tag
          BASE=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo '0.0.0')
          CANARY="${BASE}-canary.${DATE}.${HASH}"
          echo "version=$CANARY" >> $GITHUB_OUTPUT
          echo "Canary version: $CANARY"

      - name: Strip token auth from .npmrc for OIDC
        run: |
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC" ]; then
            sed -i '/_authToken/d' "$NPMRC"
          fi

      - name: Version all packages to ${{ steps.canary-version.outputs.version }}
        run: |
          VERSION="${{ steps.canary-version.outputs.version }}"
          for f in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$f', 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync('$f', JSON.stringify(pkg, null, 2) + '\\n');
            "
            echo "Versioned $f to $VERSION"
          done

      - name: Build packages
        run: npx nx run-many -t build --exclude astro --no-tui

      - name: Publish canary to npm
        run: |
          for pkg in packages/*/; do
            pkgname=$(node -e "const d=require('./${pkg}package.json'); console.log(d.name)")
            echo "Publishing $pkgname..."
            (cd "$pkg" && npm publish --access public --tag canary)
          done
        env:
          NODE_AUTH_TOKEN: ''

  publish-latest-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    if: (github.event_name == 'release' && github.event.action == 'published') || (github.event_name == 'workflow_dispatch' && inputs.job == 'publish-latest-release')
    steps:
      - name: Determine tag
        id: determine-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Check out repository at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.determine-tag.outputs.tag }}
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from release tag
        id: extract-version
        run: |
          TAG_NAME="${{ steps.determine-tag.outputs.tag }}"
          # Remove 'v' prefix if present
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Strip token auth from .npmrc for OIDC
        run: |
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC" ]; then
            sed -i '/_authToken/d' "$NPMRC"
          fi

      - name: Version all packages to ${{ steps.extract-version.outputs.version }}
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          for f in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$f', 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync('$f', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Versioned $f to $VERSION"
          done

      - name: Build packages
        run: npx nx run-many -t build --exclude astro --no-tui

      - name: Publish packages to npm
        run: |
          for pkg in packages/*/; do
            pkgname=$(node -e "const d=require('./${pkg}package.json'); console.log(d.name)")
            echo "Publishing $pkgname..."
            (cd "$pkg" && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ''
