name: Release
# NOTE: Do not rename this file. A single workflow file is required for npm trusted publishing.
# Future release types (standard, beta, etc.) will be added to this workflow.
on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  canary-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    if: "!contains(github.event.head_commit.message, '[skip-canary]')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish canary release
        run: node ./scripts/release.ts --version canary --no-dry-run --no-local
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-latest-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Check out repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          filter: tree:0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from release tag
        id: extract-version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Publish to npm
        run: node ./scripts/release.ts --version ${{ steps.extract-version.outputs.version }} --no-dry-run --no-local
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
